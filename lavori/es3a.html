<script>
// Acquisizione larghezza, altezza e lunghezza della scatola
let larg = parseFloat(prompt("Larghezza della scatola"));
let alt = parseFloat(prompt("Altezza della scatola"));
let lung = parseFloat(prompt("Lunghezza della scatola"));

// Calcolo del volume della scatola
let vol = larg * alt * lung;

// Visualizzazione del risultato
console.log("Il volume della scatola è: " + vol);
</script>
